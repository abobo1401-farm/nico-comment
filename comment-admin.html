<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ニコニココメント管理</title>
<style>
  body{margin:0;min-height:100vh;font-family:"Yu Gothic","Meiryo",sans-serif;background:#141414;color:#fff;padding:18px;box-sizing:border-box;}
  .wrap{max-width:900px;margin:auto;}
  h1{font-size:26px;margin:0 0 16px;}
  .panel{background:#222;border-radius:18px;padding:16px;margin-bottom:16px;box-shadow:0 8px 24px #0006;}
  input,select,button{font-size:16px;border:0;border-radius:10px;padding:12px;box-sizing:border-box;}
  input,select{background:#fff;color:#111;}
  button{background:#ff6b9d;color:#fff;font-weight:900;cursor:pointer;}
  .danger{background:#d93025;}
  .grid{display:grid;grid-template-columns:1fr 130px 130px 130px;gap:8px;}
  .history{display:flex;flex-direction:column-reverse;gap:8px;}
  .item{display:grid;grid-template-columns:84px 1fr 82px 82px 70px;gap:8px;align-items:center;background:#111;border:1px solid #444;border-radius:12px;padding:10px;}
  .text{font-weight:bold;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .small{font-size:13px;color:#bbb;}
  @media(max-width:700px){.grid{grid-template-columns:1fr}.item{grid-template-columns:1fr}.small{font-size:12px}}
</style>
</head>
<body>
<div class="wrap">
  <h1>🍎 ニコニココメント管理</h1>

  <div class="panel">
    <h2>テスト送信</h2>
    <div class="grid">
      <input id="text" maxlength="40" placeholder="テストコメント" value="テストコメント🍎" />
      <select id="color"><option value="white">白</option><option value="red">赤</option><option value="blue">青</option><option value="yellow">黄</option><option value="green">緑</option><option value="pink">ピンク</option><option value="orange">オレンジ</option></select>
      <select id="size"><option value="small">小</option><option value="medium" selected>中</option><option value="large">大</option><option value="xlarge">特大</option></select>
      <select id="speed"><option value="slow">遅い</option><option value="normal" selected>普通</option><option value="fast">速い</option></select>
    </div>
    <button id="send" style="margin-top:10px;width:100%;">送信</button>
  </div>

  <div class="panel">
    <h2>履歴 最新100件</h2>
    <p class="small">OBSには直近5件だけ表示。管理画面では最新100件を確認できます。</p>
    <button id="clear" class="danger">履歴を全削除</button>
  </div>

  <div id="history" class="history"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
import { getDatabase, ref, push, set, serverTimestamp, onValue, query, limitToLast, orderByChild, remove } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyBQk8Qo1hAF_pO7BO1s_ailYTcGrFiYN6E",
  authDomain: "abo-nicocomment.firebaseapp.com",
  databaseURL: "https://abo-nicocomment-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "abo-nicocomment",
  storageBucket: "abo-nicocomment.firebasestorage.app",
  messagingSenderId: "364820533562",
  appId: "1:364820533562:web:658a02e8603c8469ac8003"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const commentsRef = ref(db, "nicoComments");
const historyEl = document.getElementById("history");

function clean(text){return String(text || "").replace(/[<>]/g, "").trim().slice(0,40);}
function timeText(ms){const d=new Date(ms||Date.now());return d.toLocaleTimeString("ja-JP",{hour:"2-digit",minute:"2-digit",second:"2-digit"});}

async function sendTest(){
  const text = clean(document.getElementById("text").value);
  if(!text) return;
  await set(push(commentsRef), {
    text,
    color: document.getElementById("color").value,
    size: document.getElementById("size").value,
    speed: document.getElementById("speed").value,
    createdAt: Date.now(),
    serverTime: serverTimestamp()
  });
}

function render(snapshot){
  const items=[];
  snapshot.forEach(child => items.push({key:child.key, ...child.val()}));
  items.sort((a,b)=>(a.createdAt||0)-(b.createdAt||0));
  historyEl.innerHTML="";
  items.forEach(item => {
    const row=document.createElement("div");
    row.className="item";
    row.innerHTML = `
      <div class="small">${timeText(item.createdAt)}</div>
      <div class="text"></div>
      <div class="small">${item.color||"white"}</div>
      <div class="small">${item.size||"medium"}</div>
      <button class="danger">削除</button>
    `;
    row.querySelector(".text").textContent = clean(item.text);
    row.querySelector("button").addEventListener("click", () => remove(ref(db, "nicoComments/" + item.key)));
    historyEl.appendChild(row);
  });
}

document.getElementById("send").addEventListener("click", sendTest);
document.getElementById("clear").addEventListener("click", async () => {
  if(confirm("コメント履歴を全部削除しますか？")) await remove(commentsRef);
});
onValue(query(commentsRef, orderByChild("createdAt"), limitToLast(100)), render);
</script>
</body>
</html>
