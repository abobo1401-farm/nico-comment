<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta http-equiv="Cache-Control" content="no-store" />
<title>ニコニココメント管理</title>
<style>
  body{margin:0;min-height:100vh;font-family:"Yu Gothic","Meiryo",sans-serif;background:#101820;color:#fff;padding:20px;box-sizing:border-box;}
  .box{max-width:760px;margin:auto;background:#1f2b36;border-radius:20px;padding:22px;}
  h1{font-size:24px;margin-top:0;}
  h2{font-size:20px;margin:24px 0 8px;}
  input,select,button{width:100%;box-sizing:border-box;font-size:17px;border-radius:12px;border:0;padding:13px;margin:8px 0;}
  button{background:#4bb3ff;color:#fff;font-weight:900;cursor:pointer;}
  .danger{background:#ff4b4b;}
  .status{min-height:24px;text-align:center;font-weight:bold;}
  .row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;}
  .history{max-height:520px;overflow:auto;background:#111a22;border-radius:14px;padding:10px;}
  .item{display:grid;grid-template-columns:74px 1fr 58px;gap:8px;align-items:center;border-bottom:1px solid rgba(255,255,255,.12);padding:7px 0;font-size:15px;}
  .text{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .mini{font-size:12px;padding:7px;border-radius:8px;background:#ff4b4b;}
  .muted{color:#aac;font-size:13px;line-height:1.6;}
</style>
</head>
<body>
<div class="box">
  <h1>🍎 コメント管理</h1>
  <input id="text" maxlength="40" placeholder="テストコメント" value="テストコメント！" />
  <div class="row">
    <select id="color">
      <option value="white">白</option><option value="red">赤</option><option value="blue">青</option><option value="yellow">黄</option><option value="green">緑</option><option value="pink">ピンク</option><option value="orange">オレンジ</option>
    </select>
    <select id="size">
      <option value="small">小</option><option value="medium" selected>中</option><option value="large">大</option><option value="xlarge">特大</option>
    </select>
    <select id="speed">
      <option value="slow">遅い</option><option value="normal" selected>普通</option><option value="fast">速い</option>
    </select>
  </div>
  <button id="test">テスト送信</button>
  <button class="danger" id="clear">履歴リセット（全削除）</button>
  <div class="status" id="status"></div>

  <h2>最新100件履歴</h2>
  <div class="muted">新しい順に表示。個別削除もできます。<br>安定化のため、Firebaseから最新100件だけ取得しています。</div>
  <div class="history" id="history"></div>
</div>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
import { getDatabase, ref, push, set, remove, serverTimestamp, onValue, query, limitToLast } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-database.js";
const firebaseConfig = {
  apiKey: "AIzaSyBQk8Qo1hAF_pO7BO1s_ailYTcGrFiYN6E",
  authDomain: "abo-nicocomment.firebaseapp.com",
  databaseURL: "https://abo-nicocomment-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "abo-nicocomment",
  storageBucket: "abo-nicocomment.firebasestorage.app",
  messagingSenderId: "364820533562",
  appId: "1:364820533562:web:658a02e8603c8469ac8003"
};
const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const statusEl = document.getElementById("status");
const historyEl = document.getElementById("history");
function clean(text){return String(text||"").replace(/[<>]/g,"").slice(0,40);}
function timeStr(ts){
  if(!ts) return "--:--";
  const d = new Date(ts);
  return `${String(d.getHours()).padStart(2,"0")}:${String(d.getMinutes()).padStart(2,"0")}`;
}

document.getElementById("test").onclick = async () => {
  await set(push(ref(db,"nicoComments")), {
    text: clean(document.getElementById("text").value || "テストコメント！"),
    color: document.getElementById("color").value,
    size: document.getElementById("size").value,
    speed: document.getElementById("speed").value,
    createdAt: Date.now(),
    serverTime: serverTimestamp()
  });
  statusEl.textContent = "テスト送信しました";
};
document.getElementById("clear").onclick = async () => {
  if(confirm("履歴をリセットします。コメントを全部消していい？")){
    await remove(ref(db,"nicoComments"));
    statusEl.textContent = "履歴をリセットしました";
  }
};

function renderHistory(items){
  historyEl.innerHTML = "";
  if(items.length === 0){historyEl.innerHTML = '<div class="muted">履歴なし</div>'; return;}
  items.forEach(item => {
    const row = document.createElement("div");
    row.className = "item";
    const t = document.createElement("div"); t.textContent = timeStr(item.createdAt);
    const text = document.createElement("div"); text.className="text"; text.textContent = clean(item.text);
    const btn = document.createElement("button"); btn.className="mini"; btn.textContent="削除";
    btn.onclick = async () => { if(confirm("このコメントを削除する？")) await remove(ref(db,"nicoComments/"+item.key)); };
    row.append(t,text,btn);
    historyEl.appendChild(row);
  });
}

// 重要：全部取得しない。最新100件だけ取得して、逆順表示。
const latest100Query = query(ref(db,"nicoComments"), limitToLast(100));
onValue(latest100Query, snapshot => {
  const items = [];
  snapshot.forEach(child => items.push({key: child.key, ...child.val()}));
  items.reverse();
  renderHistory(items);
});
</script>
</body>
</html>
