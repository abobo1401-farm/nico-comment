<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ABO ニコニココメント OBS表示</title>
<style>
  html, body {margin:0;width:100%;height:100%;overflow:hidden;background:transparent;font-family:"Yu Gothic","Meiryo",sans-serif;}
  #stage {position:relative;width:100vw;height:100vh;overflow:hidden;background:transparent;}
  .comment {position:absolute;left:100vw;white-space:nowrap;font-weight:900;text-shadow:-2px -2px 0 #000,2px -2px 0 #000,-2px 2px 0 #000,2px 2px 0 #000,0 0 8px #000;animation-name:moveLeft;animation-timing-function:linear;animation-fill-mode:forwards;will-change:transform;}
  @keyframes moveLeft {from{transform:translateX(0);}to{transform:translateX(calc(-100vw - 130%));}}
</style>
</head>
<body>
<div id="stage"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
import { getDatabase, ref, onChildAdded, query, limitToLast } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyBQk8Qo1hAF_pO7BO1s_ailYTcGrFiYN6E",
  authDomain: "abo-nicocomment.firebaseapp.com",
  databaseURL: "https://abo-nicocomment-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "abo-nicocomment",
  storageBucket: "abo-nicocomment.firebasestorage.app",
  messagingSenderId: "364820533562",
  appId: "1:364820533562:web:658a02e8603c8469ac8003"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const commentsRef = ref(db, "nicoComments");
const stage = document.getElementById("stage");

const lanes = 6;
let laneIndex = 0;
const startedAt = Date.now();

const colorMap = {white:"#ffffff",red:"#ff4b4b",blue:"#4bb3ff",yellow:"#ffe94b",green:"#5cff7a",pink:"#ff7be8",orange:"#ff9d3b"};
const sizeMap = {small:28,medium:40,large:56,xlarge:74};
const durationMap = {slow:13,normal:9,fast:6};

function sanitize(text){return String(text || "").replace(/[<>]/g, "").slice(0, 40);}

function showComment(data){
  if(!data || !data.text) return;
  if(data.createdAt && data.createdAt < startedAt - 5000) return;

  const el = document.createElement("div");
  el.className = "comment";
  el.textContent = sanitize(data.text);
  el.style.fontSize = (sizeMap[data.size] || 40) + "px";
  el.style.color = colorMap[data.color] || "#ffffff";
  const duration = durationMap[data.speed] || 9;
  el.style.animationDuration = duration + "s";

  // 上下の見切れ防止：上8vh〜下24vhを空けて中央寄りに流す
  const topMargin = 8;
  const usableHeight = 68;
  const laneHeight = usableHeight / lanes;
  const lane = laneIndex % lanes;
  laneIndex++;
  const randomOffset = Math.random() * Math.max(0, laneHeight - 8);
  el.style.top = `calc(${topMargin + lane * laneHeight + randomOffset}vh)`;

  stage.appendChild(el);
  setTimeout(() => el.remove(), duration * 1000 + 1200);
}

onChildAdded(query(commentsRef, limitToLast(30)), (snapshot) => showComment(snapshot.val()));
</script>
</body>
</html>
