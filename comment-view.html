<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ABO ニコニココメント OBS表示</title>
<style>
  html, body {margin:0;width:100%;height:100%;overflow:hidden;background:transparent;font-family:"Yu Gothic","Meiryo",sans-serif;}
  #stage {position:relative;width:100vw;height:100vh;overflow:hidden;background:transparent;}
  .comment {position:absolute;left:100vw;white-space:nowrap;font-weight:900;text-shadow:-2px -2px 0 #000,2px -2px 0 #000,-2px 2px 0 #000,2px 2px 0 #000,0 0 8px #000;animation-name:moveLeft;animation-timing-function:linear;animation-fill-mode:forwards;will-change:transform;}
  @keyframes moveLeft {from{transform:translateX(0);}to{transform:translateX(calc(-100vw - 120%));}}
  #historyBox{position:absolute;right:26px;bottom:34px;width:390px;box-sizing:border-box;padding:14px 16px;border-radius:18px;background:rgba(0,0,0,.45);border:2px solid rgba(255,255,255,.45);color:#fff;text-shadow:0 2px 4px #000;font-weight:800;backdrop-filter:blur(4px);}
  #historyTitle{font-size:22px;margin-bottom:8px;}
  .historyItem{font-size:24px;line-height:1.45;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;border-top:1px solid rgba(255,255,255,.2);padding-top:4px;}
</style>
</head>
<body>
<div id="stage">
  <div id="historyBox">
    <div id="historyTitle">💬 コメント履歴</div>
    <div id="historyList"></div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
import { getDatabase, ref, onChildAdded, onValue, query, limitToLast, orderByChild } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyBQk8Qo1hAF_pO7BO1s_ailYTcGrFiYN6E",
  authDomain: "abo-nicocomment.firebaseapp.com",
  databaseURL: "https://abo-nicocomment-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "abo-nicocomment",
  storageBucket: "abo-nicocomment.firebasestorage.app",
  messagingSenderId: "364820533562",
  appId: "1:364820533562:web:658a02e8603c8469ac8003"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const commentsRef = ref(db, "nicoComments");
const stage = document.getElementById("stage");
const historyList = document.getElementById("historyList");

const lanes = 6;
let laneIndex = 0;
const startedAt = Date.now();

const colorMap = {white:"#ffffff",red:"#ff4b4b",blue:"#4bb3ff",yellow:"#ffe94b",green:"#5cff7a",pink:"#ff7be8",orange:"#ff9d3b"};
const sizeMap = {small:28,medium:40,large:56,xlarge:74};
const durationMap = {slow:13,normal:9,fast:6};

function sanitize(text){return String(text || "").replace(/[<>]/g, "").slice(0, 40);}

function showComment(data){
  if(!data || !data.text) return;
  if(data.createdAt && data.createdAt < startedAt - 5000) return;
  const text = sanitize(data.text);
  const color = data.color || "white";
  const size = data.size || "medium";
  const duration = durationMap[data.speed] || 9;

  const el = document.createElement("div");
  el.className = "comment";
  el.textContent = text;
  el.style.fontSize = (sizeMap[size] || 40) + "px";
  el.style.color = colorMap[color] || "#ffffff";
  el.style.animationDuration = duration + "s";

  // 上下で文字が切れにくいように、表示範囲を中央寄りに制限
  const topMargin = 8;
  const usableHeight = 68;
  const laneHeight = usableHeight / lanes;
  const lane = laneIndex % lanes;
  laneIndex++;
  const randomOffset = Math.random() * Math.max(0, laneHeight - 8);
  el.style.top = `calc(${topMargin + lane * laneHeight + randomOffset}vh)`;

  stage.appendChild(el);
  setTimeout(() => el.remove(), duration * 1000 + 1000);
}

function updateHistory(snapshot){
  const arr = [];
  snapshot.forEach(child => arr.push(child.val()));
  arr.sort((a,b)=>(b.createdAt||0)-(a.createdAt||0));
  historyList.innerHTML = "";
  arr.slice(0,5).forEach(item => {
    const div = document.createElement("div");
    div.className = "historyItem";
    div.textContent = sanitize(item.text);
    historyList.appendChild(div);
  });
}

onChildAdded(query(commentsRef, limitToLast(30)), (snapshot) => showComment(snapshot.val()));
onValue(query(commentsRef, orderByChild("createdAt"), limitToLast(5)), updateHistory);
</script>
</body>
</html>
