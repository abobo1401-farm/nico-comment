<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta http-equiv="Cache-Control" content="no-store" />
<title>ABO コメント履歴 OBS表示</title>
<style>
  html, body{margin:0;width:100%;height:100%;overflow:hidden;background:transparent;font-family:"Yu Gothic","Meiryo",sans-serif;}
  #historyBox{width:100vw;height:100vh;box-sizing:border-box;padding:16px 18px;border-radius:22px;background:rgba(0,0,0,.45);border:2px solid rgba(255,255,255,.45);color:#fff;text-shadow:0 2px 4px #000;font-weight:800;backdrop-filter:blur(4px);overflow:hidden;display:flex;flex-direction:column;}
  #title{font-size:26px;margin-bottom:8px;white-space:nowrap;flex:0 0 auto;}
  .item{font-size:24px;line-height:1.28;white-space:normal;overflow-wrap:anywhere;word-break:break-word;border-top:1px solid rgba(255,255,255,.22);padding:5px 0 3px;}
  #list{flex:1 1 auto;overflow:hidden;}
  .empty{opacity:.7;font-size:24px;padding-top:16px;}
</style>
</head>
<body>
<div id="historyBox">
  <div id="title">💬 コメント履歴</div>
  <div id="list"><div class="empty">コメント待ち</div></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
import { getDatabase, ref, onValue, query, limitToLast } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyBQk8Qo1hAF_pO7BO1s_ailYTcGrFiYN6E",
  authDomain: "abo-nicocomment.firebaseapp.com",
  databaseURL: "https://abo-nicocomment-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "abo-nicocomment",
  storageBucket: "abo-nicocomment.firebasestorage.app",
  messagingSenderId: "364820533562",
  appId: "1:364820533562:web:658a02e8603c8469ac8003"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const list = document.getElementById("list");

function sanitize(text){
  return String(text || "").replace(/[<>]/g, "").slice(0, 80);
}

function render(items){
  list.innerHTML = "";
  if(items.length === 0){
    list.innerHTML = '<div class="empty">コメント待ち</div>';
    return;
  }
  items.forEach(data => {
    const div = document.createElement("div");
    div.className = "item";
    div.textContent = sanitize(data.text);
    list.appendChild(div);
  });
}

// 重要：全部取得して並べ替えない。
// Firebaseのpushキー順で「最新10件だけ」取得 → 逆順表示にする。
// コメントが多くなっても更新遅れ・順番崩れが起きにくい安定版。
const latest10Query = query(ref(db, "nicoComments"), limitToLast(10));
onValue(latest10Query, (snapshot) => {
  const items = [];
  snapshot.forEach(child => {
    items.push({ key: child.key, ...child.val() });
  });
  items.reverse();
  render(items);
});
</script>
</body>
</html>
